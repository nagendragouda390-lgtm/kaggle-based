<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL Chase Predictor</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="stadium-bg"></div>

<div class="wrap">
  <div class="broadcast-bar">
    <span class="live-dot"></span>
    <span class="comp-badge"><b>IPL</b> · LIVE CHASE PREDICTOR</span>
  </div>

  <section class="scoreboard" aria-label="Win probability scoreboard">
    <div class="team-panel" id="battingPanel">
      <div class="panel-label">Batting</div>
      <div class="team-code" id="battingCode">—</div>
      <div class="flip-counter"><span id="battingProb">50.0</span><span class="pct">%</span></div>
    </div>

    <div class="vs-meter">
      <div class="meter-track">
        <div class="meter-fill" id="meterFill" style="height:50%"></div>
      </div>
      <span class="meter-label">Win Probability</span>
    </div>

    <div class="team-panel" id="bowlingPanel">
      <div class="panel-label">Bowling</div>
      <div class="team-code" id="bowlingCode">—</div>
      <div class="flip-counter"><span id="bowlingProb">50.0</span><span class="pct">%</span></div>
    </div>
  </section>

  <section class="console">
    <h2 class="console-title">Match State</h2>
    <form id="form">
      <div class="field-grid">
        <div class="field">
          <label for="team_batting">Batting Team</label>
          <select id="team_batting" name="team_batting" required>
            {% for t in teams %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
          </select>
        </div>
        <div class="field">
          <label for="team_bowling">Bowling Team</label>
          <select id="team_bowling" name="team_bowling" required>
            {% for t in teams %}<option value="{{ t }}" {% if loop.index0 == 1 %}selected{% endif %}>{{ t }}</option>{% endfor %}
          </select>
        </div>
        <div class="field">
          <label for="target">Target</label>
          <input type="number" id="target" name="target" required min="1" placeholder="e.g. 178">
        </div>
        <div class="field">
          <label for="curr_run">Current Score</label>
          <input type="number" id="curr_run" name="curr_run" required min="0" placeholder="e.g. 92">
        </div>
        <div class="field">
          <label for="curr_ball">Balls Bowled</label>
          <input type="number" id="curr_ball" name="curr_ball" required min="0" max="119" placeholder="e.g. 66">
        </div>
        <div class="field">
          <label for="curr_wick">Wickets Fallen</label>
          <input type="number" id="curr_wick" name="curr_wick" required min="0" max="9" placeholder="e.g. 3">
        </div>
      </div>

      <button type="submit" class="predict" id="submitBtn">Predict Win %</button>
      <div class="error-banner" id="errorBanner"></div>
    </form>
  </section>

  <footer>XGBoost win-probability model · 13 features · trained on IPL ball-by-ball data</footer>
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
